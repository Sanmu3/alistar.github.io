<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card - Alister</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="profile-card">
        <div class="card-header"></div>

        <div class="avatar-container">
          <img
            src="https://api.dicebear.com/8.x/lorelei/svg?seed=Alister&backgroundColor=b6e3f4,c0aede,d1d4f9"
            alt="Alister Avatar"
            class="profile-img"
          />
        </div>

        <div class="card-body">
          <h1 id="profile-name">Alister</h1>
          <p class="profile-title">Elemental Mage & Reality Scholar</p>

          <p class="profile-bio">
            Seorang manusia biasa yang berhasil menguasai sihir elemen tingkat
            tinggi melalui pemahaman mendalam tentang hukum alam dan kesialan.
            Tidak memanipulasi takdir, hanya memahaminya lebih baik dari siapa
            pun.
          </p>
        </div>

        <div class="card-footer">
          <!-- <button class="btn-primary">Lihat Skill</button>
          <button class="btn-secondary">Hubungi</button> -->
        </div>
      </div>
    </div>
  </body>
</html>
